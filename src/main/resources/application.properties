spring.application.name=sis
server.port=${PORT:7000}

# ================== Database ==================
spring.datasource.url=jdbc:mysql://localhost:3307/sis?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ================== CORS ==================
app.cors.allowed-origins=https://team5.site,http://localhost:5173

# ================== Keycloak OAuth2 Client (optional) ==================
#
spring.security.oauth2.client.registration.keycloak.client-id=sis-be
spring.security.oauth2.client.registration.keycloak.client-secret=7dd084b0-3b39-4651-b762-8d5124f9968f
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

# issuer-uri(không tao JwtDecoder)
spring.security.oauth2.client.provider.keycloak.issuer-uri=https://id.dev.codegym.vn/auth/realms/codegym-software-nhom-5
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# ================== Resource Server (JWT) ==================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://id.dev.codegym.vn/auth/realms/codegym-software-nhom-5
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://id.dev.codegym.vn/auth/realms/codegym-software-nhom-5/protocol/openid-connect/certs

# ================== Keycloak Admin (Service Account) ==================
# Dùng auto-create user trên Keycloak khi POST /api/users
keycloak.admin.server-url=https://id.dev.codegym.vn/auth
keycloak.admin.realm=codegym-software-nhom-5
keycloak.admin.client-id=sis-admin
keycloak.admin.client-secret=ffbd5df7-a801-42d5-b628-fe87d7d6ecb4
# password temporary (DEV ONLY!!)
keycloak.admin.default-temp-password=Team5@12345


# ================== Logging (debug only) ==================
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.web.client.RestTemplate=DEBUG

# ================== OpenAI Configuration (deprecated) ==================
openai.api.key=${OPENAI_API_KEY:your-api-key-here}
openai.api.base-url=https://api.openai.com/v1
openai.model=gpt-4o

# ================== Cohere Configuration (Active) ==================
cohere.api.key=U6zcRBqbM2WSGdH6UatnOgaHm5sLBIGn3syQfniM
cohere.api.base-url=https://api.cohere.com

# ================== Qdrant Configuration ==================
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
qdrant.collection.name=sis-knowledge-base

# ================== Async Configuration ==================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ================== Spring MVC Async Request Timeout ==================
# Increase timeout to 180 seconds (3 minutes) for AI chat requests
spring.mvc.async.request-timeout=180000

# ================== Vimeo API ==================
vimeo.access-token=14f5c05dad3db44ef66f443eed4a8adc
vimeo.api-url=https://api.vimeo.com/videos

# ================== Session cookie name ==================
server.servlet.session.cookie.name=SISSESSION